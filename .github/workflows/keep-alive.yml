name: Keep backend alive

on:
  schedule:
    # Every 10 minutes -- comfortably under Render's ~15 minute idle timeout
    # for free-tier services, so the service never fully spins down.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 30 https://roomies-backend-4jy5.onrender.com/
